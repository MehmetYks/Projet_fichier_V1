<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - FileDesk</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #04122e 0%, #0b1f46 100%);
            padding: 1rem;
        }
        .login-card {
            width: min(420px, 100%);
            background: #fff;
            border-radius: 14px;
            box-shadow: 0 16px 40px rgba(4, 18, 46, 0.3);
            overflow: hidden;
        }
        .login-head {
            background: #04122e;
            color: #fff;
            padding: 1.6rem;
        }
        .login-head h1 { font-size: 1.35rem; font-weight: 700; }
        .login-head p { font-size: 0.85rem; opacity: 0.8; margin-top: 0.35rem; }
        .login-body { padding: 1.35rem 1.25rem 1.2rem; }
        .form-group { margin-bottom: 0.95rem; }
        label { display: block; font-size: 0.82rem; color: #334155; margin-bottom: 0.35rem; font-weight: 600; }
        input {
            width: 100%;
            border: 1.5px solid #dbe2ef;
            border-radius: 10px;
            padding: 0.72rem 0.82rem;
            font: inherit;
            outline: none;
            color: #0f172a;
        }
        input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37,99,235,.12); }
        .btn {
            width: 100%;
            border: none;
            border-radius: 10px;
            background: #2563eb;
            color: #fff;
            font: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            padding: 0.72rem 0.82rem;
            cursor: pointer;
        }
        .btn:hover { background: #1d4ed8; }
        .error {
            display: none;
            margin-top: 0.8rem;
            font-size: 0.8rem;
            border-radius: 9px;
            padding: 0.55rem 0.65rem;
            color: #991b1b;
            background: #fee2e2;
            border: 1px solid #fecaca;
        }
        .error.show { display: block; }
    </style>
</head>
<body>
    <main class="login-card">
        <header class="login-head">
            <h1>Connexion FileDesk</h1>
            <p>Identifiez-vous avec le compte DITIB existant.</p>
        </header>
        <section class="login-body">
            <form id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Nom d'utilisateur ou email</label>
                    <input id="username" type="text" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input id="password" type="password" required>
                </div>
                <button class="btn" type="submit">Se connecter</button>
                <p id="loginError" class="error">Identifiants incorrects</p>
            </form>
        </section>
    </main>
    <script src="login.js"></script>
</body>
</html>
